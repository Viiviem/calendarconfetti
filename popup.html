<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calendar Confetti</title>
	<style>
		body { font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 12px; min-width: 320px; }
		label { display: block; font-size: 12px; color: #374151; margin-bottom: 4px; }
		input[type=text] { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; }
		button { appearance: none; border: 0; background: #111827; color: #fff; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
		button.secondary { background: #4b5563; }
		.row { display: flex; gap: 8px; align-items: center; }
		.small { font-size: 12px; color: #6b7280; }
	</style>
</head>
<body>
	<div>
		<label for="clientId">Google OAuth Client ID</label>
		<input id="clientId" type="text" placeholder="xxxxxxxxx-xxxxxxxxxxxxxxxxxxxxxxxxxxxx.apps.googleusercontent.com"/>
	</div>
	<div class="row" style="margin-top: 8px;">
		<button id="save">Save</button>
		<button id="signin">Sign in</button>
		<button id="signout" class="secondary">Sign out</button>
	</div>
	<p class="small" id="status"></p>
	<div class="row">
		<button id="test">Test overlay</button>
		<button id="refresh" class="secondary">Refresh events</button>
	</div>
	<script type="module">
		import { getAccessTokenInteractive, signOut, getClientIdStored, setClientId } from './oauth.js';
		async function init() {
			document.getElementById('clientId').value = await getClientIdStored() || '';
		}
		document.getElementById('save').addEventListener('click', async () => {
			const cid = document.getElementById('clientId').value.trim();
			await setClientId(cid);
			document.getElementById('status').textContent = 'Saved Client ID';
		});
		document.getElementById('signin').addEventListener('click', async () => {
			try {
				await getAccessTokenInteractive();
				document.getElementById('status').textContent = 'Signed in';
			} catch (e) {
				document.getElementById('status').textContent = 'Sign in failed: ' + e.message;
			}
		});
		document.getElementById('signout').addEventListener('click', async () => {
			await signOut();
			document.getElementById('status').textContent = 'Signed out';
		});
		document.getElementById('test').addEventListener('click', async () => {
			const tabs = await chrome.tabs.query({ active: true, currentWindow: true });
			if (tabs[0]?.id != null) await chrome.tabs.sendMessage(tabs[0].id, { type: 'show-confetti' });
		});
		document.getElementById('refresh').addEventListener('click', async () => {
			await chrome.runtime.sendMessage({ type: 'trigger-fetch-now' });
			document.getElementById('status').textContent = 'Refreshed events';
		});
		init();
	</script>
</body>
</html>

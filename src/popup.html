<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
	<title>Calendar Confetti</title>
	<style>
		body {
			font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
			margin: 12px;
			min-width: 320px;
			color: #111827;
		}
		label { display: block; font-size: 12px; color: #374151; margin-bottom: 4px; }
		input[type=text] {
			width: 100%; padding: 8px; box-sizing: border-box;
			border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px;
		}
		button {
			appearance: none; border: 0; background: #111827; color: #fff;
			border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer;
		}
		button.secondary { background: #4b5563; }
		.row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
		.status { font-size: 12px; color: #6b7280; margin: 6px 0 0; min-height: 16px; }
		.status.error { color: #dc2626; }
	</style>
</head>
<body>
	<div>
		<label for="clientId">Google OAuth Client ID</label>
		<input id="clientId" type="text" placeholder="xxxxxx.apps.googleusercontent.com" autocomplete="off" spellcheck="false">
	</div>
	<div class="row">
		<button id="save">Save</button>
		<button id="signin">Sign in</button>
		<button id="signout" class="secondary">Sign out</button>
	</div>
	<p class="status" id="status" aria-live="polite"></p>
	<div class="row">
		<button id="test">Test overlay</button>
		<button id="refresh" class="secondary">Refresh events</button>
	</div>
	<script type="module" src="popup.js"></script>
</body>
</html>
